name: Deploy to Firebase App Distribution

on:
  push:
    branches:
      - testing

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit message
        id: commit_msg
        run: echo "msg=$(git log -1 --pretty=%B | tr -d '\n' | cut -c1-100)" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/app/tcgData.jks
          echo "KEYSTORE_PATH=${{ github.workspace }}/app/tcgData.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Signed Release APK
        run: ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@v11.30.0
        with:
          args: >
            appdistribution:distribute "app/build/outputs/apk/release/app-release.apk" 
            --app "${{ secrets.FIREBASE_APP_ID }}" 
            --groups "test" 
            --release-notes "${{ steps.commit_msg.outputs.msg }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

